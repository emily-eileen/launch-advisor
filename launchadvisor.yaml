# =============================================================================
# BRAND / CONTENT ENGINE SECTIONS
# =============================================================================

business:
  name: "LaunchAdvisor"
  spoken_name: "launch advisor"
  tagline: "Every step. Before you need it."
  domain: "small business launch — formation, brand, first sales, operations"
  canonical_anchor_line: "Most businesses don't fail because the idea was bad. They fail because nobody told the founder what to do in the right order."

audience:
  primary: "anyone starting their first business — pre-revenue through ~$500K across all 20 business types"
  secondary: "side-hustle operators formalizing, gig workers going independent, and tradespeople leaving employers"
  traits:
    - smart but new to business formation
    - research-oriented — they Google everything
    - overwhelmed by the number of things to do
    - don't know what they don't know
    - decision-fatigued by too many tool options
    - short on time — usually doing this alongside a job
  transformation: "go from 'I have an idea' to a legally formed, branded, and revenue-generating business in the right sequence"
  voice_target: "talk to someone who just said 'okay I'm doing this — what do I actually do first?' — specific, calm, no fluff"

stances:
  core:
    - "Sequence is the most underrated part of starting a business"
    - "Most founders are delayed by questions that have a single right answer — they just don't know it yet"
    - "An LLC is not a strategy — it's a step"
    - "Your brand doesn't need to be perfect before you get your first customer"
    - "The best tool is the one you'll actually use, not the one with the most features"
    - "Perfectionism is procrastination with a better story"
    - "Your first customer matters more than your logo"
    - "Most permits take longer than you expect — start that process on day one"
    - "Undercapitalization is the most predictable startup killer"
    - "You don't need a business plan — you need a launch plan"
  rules:
    - reinforce existing stances before introducing new ones
    - avoid contradicting past positions without explicit reframing
    - always ground advice in the specific business type when possible — generic advice is the enemy of trust

funnel_assets:
  tofu:
    - name: "Free launch checklist"
      url: "https://launchadvisor.co/checklist"
    - name: "Launch phase quiz"
      url: "https://launchadvisor.co/quiz"
    - name: "Business type comparison guides"
      url: "https://launchadvisor.co/guides"
  mofu:
    - name: "Phase-by-phase guide library"
      url: "https://launchadvisor.co/guides"
    - name: "Resources directory"
      url: "https://launchadvisor.co/resources"
  bofu:
    - name: "Save my progress (email capture)"
      url: "https://launchadvisor.co/checklist"

cadence:
  schedule:
    monday:
      theme: "Business Type Spotlight"
      focus:
        - pick one of the 18 target business types
        - walk through the single most common mistake founders in that category make in phase 1-3
    tuesday:
      theme: "Tool or Decision Comparison"
      focus:
        - LLC vs S-Corp, Canva vs Figma, Stripe vs Square, Wix vs Shopify
        - comparison-format — specific, opinionated, no hedging
    wednesday:
      theme: "Step-by-Step Process"
      focus:
        - how to get an EIN, how to open a business bank account, how to file a DBA
        - single-action walkthroughs
    thursday:
      theme: "First Customer / First Revenue"
      focus:
        - pre-sales, outreach, pricing the first offer, finding the first 10 customers
    friday:
      theme: "Founder Case Study or Story"
      focus:
        - real founder, specific business type, specific phase, what worked and what didn't
    saturday:
      theme: "Quick Win Saturday"
      focus:
        - one thing a founder can do in under 30 minutes today to move forward
    sunday:
      theme: "Big Picture"
      focus:
        - the full arc of starting a business — sequence, capital, risk, timing
  short_form_days:
    - monday
    - tuesday
    - wednesday
    - thursday
  medium_form_days:
    - saturday
  long_form_days:
    - sunday
  written_days:
    - friday
  weekly_mix:
    min_tofu: 2
    min_mofu: 2
    min_bofu: 1
  hook_rotation:
    rule: "No two posts in the same week should use the same hook type"
    types:
      - stat_based
      - diagnostic
      - direct_challenge
      - ironic_contrast
      - contrarian
      - gut_punch
      - scenario_specific  # "If you're starting a food truck in Texas..."
