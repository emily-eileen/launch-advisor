compliance:
  regulated_claims_rules:
    - "Do not provide specific legal advice — always recommend consulting a licensed attorney for entity selection, contracts, or IP"
    - "Do not provide specific tax advice — always recommend consulting a CPA or enrolled agent for tax strategy"
    - "Do not imply guaranteed income or revenue outcomes from following the checklist"
  disclaimers_required:
    - "LaunchAdvisor is for educational purposes only and does not constitute legal, financial, or tax advice."
  topics_to_avoid:
    - specific investment advice
    - specific legal strategy for individual situations
    - medical or health claims

